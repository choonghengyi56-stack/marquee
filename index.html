<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marquee</title>
<style>
.marquee {
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
}

.marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 10s linear infinite;
}

@keyframes scroll {
    from {
        transform: translateX(0);
    }
    to {
        transform: translateX(-100%);
    }
}
</style>
</head>
<body>

<div class="marquee">
    <span>📢 Selamat Datang！</span>
</div>

</body>
</html>
